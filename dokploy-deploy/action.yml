name: 'Docker Build, Cache & Dokploy Deploy'
description: 'Builds a Docker image, pushes it to GHCR, caches it on GitHub, and triggers Dokploy webhook'
inputs:
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  file:
    description: 'Path to the Dockerfile'
    required: false
    default: './Dockerfile'
  image_name:
    description: 'Docker image name (defaults to repository name in lowercase)'
    required: false
  registry:
    description: 'Docker registry'
    required: false
    default: 'ghcr.io'
  username:
    description: 'Username for Docker registry'
    required: false
    default: '${{ github.actor }}'
  password:
    description: 'Password/Token for Docker registry'
    required: false
    default: '${{ github.token }}'
  deploy_hook_url:
    description: 'Dokploy deployment webhook URL'
    required: true
  no_cache:
    description: 'Disable Docker cache'
    required: false
    default: 'false'
  platforms:
    description: 'Target platforms'
    required: false
    default: 'linux/amd64'
  build_args:
    description: 'List of build-time variables (e.g. KEY=VALUE, one per line)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Set lowercase repository name and SHA
      id: meta
      shell: bash
      run: |
        if [ -z "${{ inputs.image_name }}" ]; then
          REPO_NAME="${GITHUB_REPOSITORY,,}"
        else
          REPO_NAME="${{ inputs.image_name }}"
        fi
        echo "repo=${REPO_NAME}" >> $GITHUB_OUTPUT
        echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        push: true
        tags: |
          ${{ inputs.registry }}/${{ steps.meta.outputs.repo }}:latest
          ${{ inputs.registry }}/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.sha_short }}
        platforms: ${{ inputs.platforms }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        no-cache: ${{ inputs.no_cache }}
        build-args: ${{ inputs.build_args }}

    - name: Trigger deployment webhook
      shell: bash
      env:
        DEPLOY_HOOK_URL: ${{ inputs.deploy_hook_url }}
      run: |
        echo "Triggering Dokploy deployment..."
        COMMIT_MESSAGE=$(git log -1 --pretty=%B)
        PAYLOAD=$(jq -n \
          --arg ref "${GITHUB_REF}" \
          --arg id "${GITHUB_SHA}" \
          --arg message "$COMMIT_MESSAGE" \
          '{ref: $ref, head_commit: {id: $id, message: $message}}')
        curl -X POST \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: push" \
          -d "$PAYLOAD" \
          "$DEPLOY_HOOK_URL" || echo "Webhook failed, but continuing..."

    - name: Deploy done
      shell: bash
      run: |
        echo "Deploy done"
